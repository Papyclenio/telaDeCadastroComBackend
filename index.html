<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/style.css" />
    <title>cadastro</title>
  </head>

  <body>
    <div class="content">
      <form>
        <div class="content_input">
          <div class="display">
            <label for="input_nome">Nome completo</label>
            <input
              type="text"
              id="input_nome"
              placeholder="Nome completo"
              required
            />
          </div>
          <div class="display">
            <label for="input_email">E-mail</label>
            <input
              type="email"
              id="input_email"
              placeholder="E-mail"
              autocomplete="email"
              required
            />
          </div>
          <div class="display">
            <label for="input_password">Password</label>
            <input
              type="password"
              id="input_password"
              placeholder="Password"
              required
            />
          </div>
        </div>
        <div class="button_content">
          <button>Cadastrar</button>
        </div>
      </form>
      <div class="content_usuarioLogado">
        <h2>Usuário logado</h2>
        <div id="usuarioLogado">
        </div>

      </div>
    </div>
    <script src="src/js/scriprt.js"></script>
    <script src="src/js/buscarUsuarioLogado.js"></script>
  </body>
</html>
